<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — {{ article.title }} — KiwiListen</title>
  <link rel="stylesheet" href="/static/kiwi.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥝</text></svg>" />
  <style>
    .quiz-header { text-align:center; margin-bottom:28px; }
    .quiz-header h2 { font-size:22px; color:var(--dark); margin-bottom:4px; }
    .quiz-header p  { font-size:12px; color:var(--sage); }

    .quiz-progress {
      display:flex; gap:4px; justify-content:center; margin-bottom:24px;
    }
    .quiz-dot {
      width:10px; height:10px; border-radius:50%;
      background:var(--clay); border:1.5px solid var(--tan);
      transition: all .2s;
    }
    .quiz-dot.correct  { background:#22c55e; border-color:#22c55e; }
    .quiz-dot.wrong    { background:#ef4444; border-color:#ef4444; }
    .quiz-dot.active   { transform:scale(1.3); border-color:var(--forest); }

    .quiz-card {
      max-width:600px; margin:0 auto; background:var(--cream);
      border:1.5px solid var(--tan); border-radius:var(--radius-lg);
      padding:28px 24px; text-align:center;
    }

    .quiz-sentence {
      font-family:'Instrument Serif',Georgia,serif;
      font-size:19px; line-height:1.6; color:var(--dark);
      margin-bottom:24px; min-height:60px;
    }
    .quiz-blank {
      display:inline-block; border-bottom:3px solid var(--gold);
      min-width:80px; font-weight:700; color:var(--gold);
      padding:0 4px; transition:all .3s;
    }
    .quiz-blank.revealed {
      color:#22c55e; border-color:#22c55e;
    }
    .quiz-blank.wrong-reveal {
      color:#ef4444; border-color:#ef4444; text-decoration:line-through;
    }

    .quiz-play-btn {
      width:64px; height:64px; border-radius:50%;
      background:var(--forest); color:#fff; border:none;
      font-size:28px; cursor:pointer; margin:0 auto 20px;
      display:flex; align-items:center; justify-content:center;
      transition: all .15s; box-shadow:0 2px 8px rgba(0,0,0,.15);
    }
    .quiz-play-btn:hover { background:var(--dark); transform:scale(1.05); }
    .quiz-play-btn.playing { background:var(--gold); color:var(--dark); }

    .quiz-options { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
    .quiz-opt-btn {
      padding:14px 18px; border:1.5px solid var(--tan); border-radius:var(--radius);
      background:#fff; color:var(--dark); font-size:15px; font-weight:600;
      cursor:pointer; transition:all .15s; text-align:left;
    }
    .quiz-opt-btn:hover:not(:disabled) { border-color:var(--forest); background:var(--gold-lt); }
    .quiz-opt-btn.correct-pick { border-color:#22c55e; background:#dcfce7; color:#166534; }
    .quiz-opt-btn.wrong-pick   { border-color:#ef4444; background:#fee2e2; color:#991b1b; }
    .quiz-opt-btn:disabled { cursor:default; opacity:.85; }

    .quiz-hint {
      font-size:12px; color:var(--sage); margin-top:12px;
      font-style:italic; min-height:18px;
    }

    .quiz-next-btn {
      margin-top:20px; padding:12px 28px;
      background:var(--forest); color:#fff; border:none;
      border-radius:var(--radius); font-size:13px; font-weight:700;
      cursor:pointer; display:none; transition:all .15s;
    }
    .quiz-next-btn:hover { background:var(--dark); }

    .quiz-score-bar {
      display:flex; justify-content:space-between; align-items:center;
      font-size:13px; color:var(--sage); font-weight:600;
      margin-bottom:16px;
    }

    /* Summary screen */
    .quiz-summary { text-align:center; padding:40px 20px; }
    .quiz-summary h2 { font-size:26px; color:var(--dark); margin-bottom:8px; }
    .quiz-summary .big-score {
      font-size:48px; font-weight:800; color:var(--forest); margin:16px 0;
    }
    .quiz-summary p { color:var(--sage); font-size:14px; line-height:1.6; }
    .quiz-summary .retry-btn {
      margin-top:20px; padding:12px 28px;
      background:var(--gold); color:var(--dark); border:none;
      border-radius:var(--radius); font-size:14px; font-weight:700;
      cursor:pointer; transition:all .15s;
    }
    .quiz-summary .retry-btn:hover { background:#c08c5a; }

    /* Settings bar */
    .quiz-settings {
      display:flex; gap:12px; justify-content:center; align-items:center;
      flex-wrap:wrap; margin-bottom:20px;
    }
    .quiz-settings label {
      font-size:12px; font-weight:600; color:var(--sage); text-transform:uppercase;
      letter-spacing:.5px;
    }
    .quiz-settings select {
      padding:6px 10px; border:1.5px solid var(--tan); border-radius:var(--radius);
      background:#fff; color:var(--dark); font-size:13px; font-weight:600;
      cursor:pointer;
    }
    .quiz-settings select:focus { border-color:var(--forest); outline:none; }
    .quiz-settings-btn {
      padding:8px 20px; background:var(--forest); color:#fff; border:none;
      border-radius:var(--radius); font-size:13px; font-weight:700;
      cursor:pointer; transition:all .15s;
    }
    .quiz-settings-btn:hover { background:var(--dark); }
  </style>
</head>
<body>

<div class="page">
  <header class="site-header">
    <div class="header-inner">
      <a href="/listen/{{ slug }}" class="back-link">← Back to Player</a>
      <div class="brand">
        <div class="brand-icon">K</div>
        <div>
          <h1 class="brand-title">KiwiListen</h1>
          <p class="brand-sub">Listening Quiz — Connected Speech</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <div class="quiz-header">
      <h2>{{ article.title }}</h2>
      <p>Listen carefully — can you hear the missing word?</p>
    </div>

    <div class="quiz-settings">
      <div>
        <label for="sel-difficulty">Difficulty</label><br>
        <select id="sel-difficulty">
          <option value="easy"   {{ 'selected' if difficulty == 'easy' }}>Easy</option>
          <option value="medium" {{ 'selected' if difficulty == 'medium' }}>Medium</option>
          <option value="hard"   {{ 'selected' if difficulty == 'hard' }}>Hard</option>
        </select>
      </div>
      <div>
        <label for="sel-count">Questions</label><br>
        <select id="sel-count">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="20">20</option>
        </select>
      </div>
      <div>
        <label for="sel-speed">Speed</label><br>
        <select id="sel-speed">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1.0" selected>1.0×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>
      <div>
        <label>&nbsp;</label><br>
        <a class="quiz-settings-btn" id="apply-settings" href="#">Apply &amp; Restart</a>
      </div>
    </div>

    <div class="quiz-progress" id="quiz-progress"></div>
    <div class="quiz-score-bar">
      <span id="score-label">Score: 0 / 0</span>
      <span id="q-label">Question 1 / {{ total }}</span>
    </div>

    <div class="quiz-card" id="quiz-card">
      <!-- Sentence with blank -->
      <div class="quiz-sentence" id="quiz-sentence"></div>

      <!-- Play button -->
      <button class="quiz-play-btn" id="quiz-play" title="Play sentence">▶</button>

      <!-- Options -->
      <div class="quiz-options" id="quiz-options"></div>

      <!-- Hint -->
      <div class="quiz-hint" id="quiz-hint"></div>

      <!-- Next button -->
      <button class="quiz-next-btn" id="quiz-next">Next →</button>
    </div>

    <!-- Summary (hidden initially) -->
    <div class="quiz-card quiz-summary" id="quiz-summary" style="display:none;">
      <h2>Quiz Complete!</h2>
      <div class="big-score" id="summary-score"></div>
      <p id="summary-msg"></p>
      <div id="past-scores" style="margin-top:16px;font-size:13px;color:var(--sage);"></div>
      <button class="retry-btn" onclick="location.reload()">Try Again</button>
      <br>
      <a href="/listen/{{ slug }}" style="display:inline-block;margin-top:12px;font-size:13px;color:var(--forest);font-weight:600;">← Back to full article</a>
      <a href="/" style="display:inline-block;margin-top:12px;margin-left:16px;font-size:13px;color:var(--sage);font-weight:600;">← All articles</a>
    </div>

  </main>

  <footer class="site-footer">
    <p>© 2026 KiwiListen · Connected Speech Quiz</p>
  </footer>
</div>

<audio id="quiz-audio" preload="auto"></audio>

<script>
  const SLUG       = "{{ slug }}";
  const SENTENCES  = {{ sentences_json | safe }};
  const QUIZ_DATA  = {{ quiz_data_json | safe }};
  const TOTAL      = {{ total }};
  const SPEED      = {{ speed }};
  const DIFFICULTY = "{{ difficulty }}";
</script>
<script src="/static/js/quiz.js"></script>
</body>
</html>
